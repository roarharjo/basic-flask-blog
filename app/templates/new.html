{% extends 'base.html' %}
{% block title %}New Post - My Blog{% endblock %}
{% block content %}
  <h2 class="text-3xl font-bold mb-6">New Post</h2>
  <form method="post" class="card max-w-2xl">
    <div class="mb-4">
      <label for="title" class="block text-sm font-medium text-dark-fg mb-2">Title</label>
      <input type="text" id="title" name="title" class="form-input" required />
    </div>
    <div class="mb-6">
      <label for="body" class="block text-sm font-medium text-dark-fg mb-2">Body</label>
      <textarea id="body" name="body" rows="10" class="form-input" required></textarea>
    </div>
    <button type="submit" class="btn-primary">Create Post</button>
  </form>
{% endblock %}
