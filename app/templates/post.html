{% extends 'base.html' %}
{% block title %}{{ post.title }} - My Blog{% endblock %}
{% block content %}
  <article class="card">
    <h2 class="text-3xl font-bold mb-4">{{ post.title }}</h2>
    <div class="text-sm text-dark-muted mb-6">
      {{ post.created_at.strftime('%Y-%m-%d %H:%M') }}{% if post.author %} • by {{ post.author.username }}{% endif %}
    </div>
    <div class="prose prose-invert max-w-none">
      <p class="whitespace-pre-wrap">{{ post.body }}</p>
    </div>
  </article>
  <div class="mt-6">
    <a href="{{ url_for('blog.index') }}" class="btn-secondary">← Back to home</a>
  </div>
{% endblock %}
