services:
  app:
    build: .
    image: trailing-blog-app:latest
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - DATABASE_URL=sqlite:////data/blog.db
    volumes:
      - app-data:/data
      - ./:/app:rw
      - /app/node_modules
      - dist-data:/app/app/static/dist
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    build: ./nginx
    image: trailing-blog-nginx:latest
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
      - ./:/app:ro
      - dist-data:/app/app/static/dist:ro
    restart: unless-stopped

volumes:
  app-data:
  dist-data:


